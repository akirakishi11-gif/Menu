<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramen Ten — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Armenian:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #0e0c0a;
    --bg3:   #1e1a16;
    --gold:  #c9a96e;
    --glt:   #e8c98a;
    --red:   #c0392b;
    --cream: #f2ead8;
    --muted: #7a7060;
    --bdr:   rgba(201,169,110,0.18);
    --bdr2:  rgba(201,169,110,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--cream);
    font-family:'DM Sans','Noto Sans Armenian',sans-serif;
    min-height:100vh; overflow-x:hidden;
  }

/* HERO */
.hero {
background:linear-gradient(160deg,#1c1710 0%,#0e0c0a 100%);
border-bottom:1px solid var(–bdr);
padding:40px 24px 28px; text-align:center;
position:relative; overflow:hidden;
}
.hero::before {
content:‘拉麺天’;
position:absolute; font-family:‘Shippori Mincho’,serif;
font-size:7rem; color:rgba(201,169,110,0.04);
top:50%; left:50%; transform:translate(-50%,-50%);
pointer-events:none; white-space:nowrap;
}
.hero-title { font-family:‘Shippori Mincho’,serif; font-size:1.9rem; font-weight:600; color:var(–gold); letter-spacing:.14em; }
.hero-line  { width:36px; height:1px; background:var(–gold); margin:10px auto; opacity:.4; }
.hero-sub   { font-size:.72rem; color:var(–muted); letter-spacing:.24em; text-transform:uppercase; }

/* HEADER */
header {
position:sticky; top:0; z-index:100;
background:rgba(14,12,10,.97); backdrop-filter:blur(14px);
border-bottom:1px solid var(–bdr);
padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:56px;
}
.logo { font-family:‘Shippori Mincho’,serif; font-size:1.05rem; letter-spacing:.15em; color:var(–gold); }

/* LANG */
.lang-sw { display:flex; gap:2px; background:var(–bg3); border-radius:20px; padding:3px; border:1px solid var(–bdr); }
.lang-btn {
background:none; border:none; color:var(–muted);
font-family:‘DM Sans’,sans-serif; font-size:.72rem; font-weight:500;
padding:4px 10px; border-radius:16px; cursor:pointer; transition:all .2s;
}
.lang-btn.active { background:var(–gold); color:var(–bg); }
.lang-btn:hover:not(.active) { color:var(–cream); }

/* TABS */
.tab-bar {
display:flex; overflow-x:auto; scrollbar-width:none;
border-bottom:1px solid var(–bdr2); background:var(–bg);
position:sticky; top:56px; z-index:90; padding:0 16px;
}
.tab-bar::-webkit-scrollbar { display:none; }
.tab-btn {
flex-shrink:0; background:none; border:none; color:var(–muted);
font-family:‘DM Sans’,sans-serif; font-size:.75rem; letter-spacing:.08em; text-transform:uppercase;
padding:13px 16px 11px; cursor:pointer; border-bottom:2px solid transparent;
transition:color .2s,border-color .2s; white-space:nowrap;
}
.tab-btn:hover { color:var(–cream); }
.tab-btn.active { color:var(–gold); border-bottom-color:var(–gold); }

/* CONTAINER */
.container { max-width:680px; margin:0 auto; padding:0 16px 80px; }

/* SECTION TITLE */
.sec-title {
font-family:‘Shippori Mincho’,serif; font-size:.62rem;
letter-spacing:.32em; text-transform:uppercase; color:var(–gold);
padding:28px 0 14px; display:flex; align-items:center; gap:14px;
}
.sec-title::after { content:’’; flex:1; height:1px; background:var(–bdr); }

/* ITEM */
.item {
display:flex; align-items:flex-start; gap:14px;
padding:18px 10px 18px 0; border-bottom:1px solid var(–bdr2);
border-radius:6px; transition:background .15s,padding .15s;
animation:fadeUp .35s ease both;
}
.item:hover { background:rgba(201,169,110,.05); padding:18px 10px; }
.item:last-child { border-bottom:none; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.plate {
width:76px; height:76px; border-radius:8px;
background:var(–bg3); border:1px solid var(–bdr2);
display:flex; align-items:center; justify-content:center;
font-size:2rem; flex-shrink:0;
}

.body { flex:1; min-width:0; }
.name { font-family:‘Shippori Mincho’,serif; font-size:1rem; font-weight:600; color:var(–cream); line-height:1.3; margin-bottom:3px; }
.jp   { font-size:.68rem; color:var(–muted); letter-spacing:.1em; margin-bottom:6px; }
.desc { font-size:.78rem; color:var(–muted); line-height:1.55; }
.tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.tag  { font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:20px; border:1px solid; }
.tag-spicy { color:var(–red);   border-color:var(–red); }
.tag-veg   { color:#7ab87a;      border-color:#7ab87a; }
.tag-vegan { color:#4caf50;      border-color:#4caf50; }
.tag-halal { color:#b8a07a;      border-color:#b8a07a; }
.tag-rich  { color:var(–glt);   border-color:var(–glt); }

.right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; padding-top:2px; }
.price { font-size:.95rem; font-weight:500; color:var(–gold); white-space:nowrap; }
.price-mega { font-size:.7rem; color:var(–muted); white-space:nowrap; }

/* CARD (dessert/drink) */
.card-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:4px; }
.card {
background:var(–bg3); border:1px solid var(–bdr2);
border-radius:10px; padding:14px;
animation:fadeUp .35s ease both;
}
.card-title { font-family:‘Shippori Mincho’,serif; font-size:.88rem; font-weight:600; color:var(–cream); margin-bottom:4px; }
.card-price { font-size:.8rem; color:var(–gold); margin-bottom:6px; }
.card-desc  { font-size:.73rem; color:var(–muted); line-height:1.5; }

/* TOPPING LIST */
.topping-row {
display:flex; justify-content:space-between; align-items:baseline;
padding:10px 0; border-bottom:1px solid var(–bdr2); font-size:.83rem;
animation:fadeUp .35s ease both;
}
.topping-row:last-child { border-bottom:none; }
.topping-name { color:var(–cream); }
.topping-price { color:var(–gold); white-space:nowrap; margin-left:12px; }

/* POLICY */
.policy {
margin-top:24px; padding:16px; border:1px solid var(–bdr);
border-radius:10px; background:var(–bg3);
font-size:.76rem; color:var(–muted); line-height:1.7;
}
.policy p + p { margin-top:6px; }

/* NOTE */
.note {
margin-top:28px; padding:13px 16px;
border:1px solid var(–bdr); border-radius:8px;
background:var(–bg3); font-size:.74rem; color:var(–muted); line-height:1.6; text-align:center;
}

/* SCROLL TOP */
#scrollTop {
position:fixed; bottom:24px; right:20px;
width:40px; height:40px; background:var(–gold); color:var(–bg);
border:none; border-radius:50%; font-size:1.1rem; cursor:pointer;
display:none; align-items:center; justify-content:center;
box-shadow:0 4px 18px rgba(0,0,0,.45); z-index:200;
}
#scrollTop.on { display:flex; }

@media(max-width:420px){
.card-grid { grid-template-columns:1fr; }
}
</style>

  rich: { en:"Rich Broth",  ru:"Насыщ. бульон",am:"Hаруст" }
};

const SEC_L = {
  ramen:   { en:"Ramen",    ru:"Рамен",    am:"Ռամен"   },
  toppings:{ en:"Toppings", ru:"Добавки",  am:"Toppings" },
  dessert: { en:"Desserts", ru:"Десерты",  am:"Avetar"  },
  drinks:  { en:"Drinks",   ru:"Напитки",  am:"Xмичk"   }
};

const NOTE_L = {
  en:"All broths are made fresh daily. No artificial flavours or chemical additives. Please inform your server of any allergies.",
  ru:"Бульоны готовятся свежими каждый день. Без искусственных ароматизаторов. Сообщите официанту об аллергиях.",

};

// ══════════════════════════════════════════
let lang = 'en';
let tab  = 'ramen';

function renderRamen(){
  const c = document.getElementById('container');
  c.innerHTML = `<div class="sec-title">${SEC_L[tab][lang]}</div>`;
  RAMEN.forEach((item,i) => {
    const tagsHtml = item.tags.map(t=>`<span class="tag tag-${t}">${TAG_L[t][lang]}</span>`).join('');
    const el = document.createElement('div');
    el.className = 'item';
    el.style.animationDelay = (i*.05)+'s';
    el.innerHTML = `
      <div class="plate">${item.emoji}</div>
      <div class="body">
        <div class="name">${item[lang].name}</div>
        <div class="jp">${item.jp}</div>
        <div class="desc">${item[lang].desc}</div>
        <div class="tags">${tagsHtml}</div>
      </div>
      <div class="right">
        <div class="price">${item.std}</div>
        <div class="price-mega">${item.mega}</div>
      </div>`;
    c.appendChild(el);
  });
  c.insertAdjacentHTML('beforeend',`<div class="note">${NOTE_L[lang]}</div>`);
}

function renderToppings(){
  const c = document.getElementById('container');
  c.innerHTML = `<div class="sec-title">${SEC_L[tab][lang]}</div>`;
  TOPPINGS[lang].forEach((t,i)=>{
    const el = document.createElement('div');
    el.className = 'topping-row';
    el.style.animationDelay = (i*.05)+'s';
    el.innerHTML = `<span class="topping-name">${t.name}</span><span class="topping-price">${t.price}</span>`;
    c.appendChild(el);
  });
}

function renderCards(data){
  const c = document.getElementById('container');
  c.innerHTML = `<div class="sec-title">${SEC_L[tab][lang]}</div>`;
  const grid = document.createElement('div');
  grid.className = 'card-grid';
  data[lang].forEach((item,i)=>{
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = (i*.05)+'s';
    el.innerHTML = `
      <div style="font-size:1.5rem;margin-bottom:8px">${item.emoji}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-price">${item.price}</div>
      <div class="card-desc">${item.desc}</div>`;
    grid.appendChild(el);
  });
  c.appendChild(grid);
}

function render(){
  if(tab==='ramen')    renderRamen();
  else if(tab==='toppings') renderToppings();
  else if(tab==='dessert')  renderCards(DESSERTS);
  else if(tab==='drinks')   renderCards(DRINKS);
  window.scrollTo({top:0,behavior:'smooth'});
}

// Tabs
document.querySelector('.tab-bar').addEventListener('click',e=>{
  const b = e.target.closest('.tab-btn');
  if(!b) return;
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  tab = b.dataset.tab;
  render();
});

// Lang
document.querySelector('.lang-sw').addEventListener('click',e=>{
  const b = e.target.closest('.lang-btn');
  if(!b) return;
  document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  lang = b.dataset.lang;
  render();
});

// Scroll top
const stBtn = document.getElementById('scrollTop');
window.addEventListener('scroll',()=> stBtn.classList.toggle('on', scrollY>280));
stBtn.addEventListener('click',()=> window.scrollTo({top:0,behavior:'smooth'}));

render();
</script>
